name: Build ResChange Patched

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Sempre parte do codigo original do GitHub
      - name: Clonar codigo fonte original
        run: |
          git clone https://github.com/Xposed-Modules-Repo/com.game.reschange source
          cp -r source/. .
          rm -rf source

      # ── PATCH 1 — XposedInit.java ─────────────────────────────────────────
      # Corrige 3 bugs:
      #   1. Hook no system_server (processo "android") — e aqui que o Android
      #      decide se o app pode usar cmd game downscale
      #   2. CATEGORY_GAME apenas nos apps configurados pelo usuario
      #      (original marcava TODO app como jogo — bug de categoria)
      #   3. Reaplicar downscale automaticamente ao abrir o app
      #      (original precisava clicar Apply toda vez)
      # Le configuracoes via /data/local/tmp/reschange_config.txt (644)
      # sem depender de createPackageContext (bloqueado pelo SELinux 12+)
      - name: Patch 1 — XposedInit.java
        run: echo '' | base64 -d > app/src/main/java/com/game/reschange/XposedInit.java

      # ── PATCH 2 — ScalePrefs.kt ───────────────────────────────────────────
      # Grava /data/local/tmp/reschange_config.txt com chmod 644
      # para que o XposedInit leia de qualquer processo.
      # Adiciona removeScale() e clearAll() para reset funcionar corretamente.
      - name: Patch 2 — ScalePrefs.kt
        run: echo '' | base64 -d > app/src/main/java/com/game/reschange/ScalePrefs.kt

      # ── PATCH 3 — MainActivity.kt ─────────────────────────────────────────
      # Corrige 2 bugs:
      #   1. Lista TODOS os apps instalados (original so listava apps com launcher)
      #   2. Reset usa ScalePrefs.clearAll() e removeScale() corretamente
      - name: Patch 3 — MainActivity.kt
        run: echo '' | base64 -d > app/src/main/java/com/game/reschange/MainActivity.kt

      # ── Verificacao dos patches ───────────────────────────────────────────
      - name: Verificar patches
        run: |
          python3 - << 'EOF'
          import sys
          errors = []
          x = open('app/src/main/java/com/game/reschange/XposedInit.java').read()
          s = open('app/src/main/java/com/game/reschange/ScalePrefs.kt').read()
          m = open('app/src/main/java/com/game/reschange/MainActivity.kt').read()
          x_code = '\n'.join(l for l in x.split('\n') if not l.strip().startswith('//'))
          checks = [
              ('"android".equals'           in x_code, 'XposedInit: hook system_server'),
              ('CATEGORY_GAME'              in x_code, 'XposedInit: CATEGORY_GAME'),
              ('isConfigured'               in x_code, 'XposedInit: isConfigured'),
              ('applyDownscale'             in x_code, 'XposedInit: applyDownscale'),
              ('getApplicationInfoAsUser'   in x_code, 'XposedInit: fallback hook'),
              ('writeConfigFile'            in s,      'ScalePrefs: writeConfigFile'),
              ('removeScale'                in s,      'ScalePrefs: removeScale'),
              ('clearAll'                   in s,      'ScalePrefs: clearAll'),
              ('chmod 644'                  in s,      'ScalePrefs: chmod 644'),
              ('getInstalledApplications'   in m,      'MainActivity: todos os apps'),
              ('ScalePrefs.clearAll'        in m,      'MainActivity: clearAll'),
              ('ScalePrefs.removeScale'     in m,      'MainActivity: removeScale'),
              ('cmd game downscale'         in m,      'MainActivity: cmd game downscale'),
          ]
          for ok, label in checks:
              print(('OK  ' if ok else 'FAIL'), label)
              if not ok: errors.append(label)
          if errors:
              print('\nFalhas:', errors)
              sys.exit(1)
          print('\nTodos os patches verificados!')
          EOF

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Permissao gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ResChange-Patched-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
