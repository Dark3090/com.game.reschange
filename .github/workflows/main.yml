name: Build ResChange Reborn Full

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone original source
        run: git clone https://github.com/Xposed-Modules-Repo/com.game.reschange source

      - name: Copy source
        run: |
          cp -r source/* .
          rm -rf source

      - name: Apply FULL Patch
        run: |
          python3 << 'PYEOF'
          import os, pathlib

          base="app/src/main/java/com/game/reschange"
          pathlib.Path(base).mkdir(parents=True, exist_ok=True)

          open(base+"/ScalePrefs.kt","w",encoding="utf-8").write("""
package com.game.reschange

import android.content.Context
import java.io.File

object ScalePrefs {
    private const val PREF_NAME = "scale_prefs"
    private const val CONFIG_FILE = "/data/local/tmp/reschange_config.txt"

    fun saveScale(context: Context, pkg: String, scale: Float) {
        context.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE)
            .edit().putFloat(pkg, scale).commit()
        exportConfig(context)
    }

    fun getScale(context: Context, pkg: String): Float =
        context.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE)
            .getFloat(pkg, 1.0f)

    fun removeScale(context: Context, pkg: String) {
        context.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE)
            .edit().remove(pkg).commit()
        exportConfig(context)
    }

    fun clearAll(context: Context) {
        context.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE)
            .edit().clear().commit()
        exportConfig(context)
    }

    private fun exportConfig(context: Context) {
        try {
            val prefs=context.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE)
            val text=prefs.all
                .filter { it.value is Float && (it.value as Float) < 1.0f }
                .map { "${it.key}=${it.value}" }
                .joinToString("\\n")
            File(CONFIG_FILE).writeText(text)
            Runtime.getRuntime().exec(arrayOf("su","-c","chmod 644 $CONFIG_FILE")).waitFor()
        } catch(_: Exception){}
    }
}
""")

          open(base+"/XposedInit.java","w",encoding="utf-8").write(r"""
package com.game.reschange;

import android.content.pm.ApplicationInfo;
import java.io.*;
import java.util.Locale;
import de.robv.android.xposed.*;
import de.robv.android.xposed.callbacks.XC_LoadPackage.LoadPackageParam;

public class XposedInit implements IXposedHookLoadPackage {
    private static final String FILE="/data/local/tmp/reschange_config.txt";

    public void handleLoadPackage(final LoadPackageParam lpparam) throws Throwable {

        if ("android".equals(lpparam.packageName)) {
            try {
                Class<?> cls=XposedHelpers.findClass(
                    "com.android.server.pm.PackageManagerService",
                    lpparam.classLoader
                );

                XposedBridge.hookAllMethods(cls,"getApplicationInfo",
                    new XC_MethodHook() {
                        protected void afterHookedMethod(MethodHookParam p) throws Throwable {
                            ApplicationInfo info=(ApplicationInfo)p.getResult();
                            if(info==null) return;
                            if(getScale(info.packageName)<1.0f){
                                info.category=ApplicationInfo.CATEGORY_GAME;
                                p.setResult(info);
                            }
                        }
                    });
            } catch(Throwable e){ XposedBridge.log(e); }
            return;
        }

        final String pkg=lpparam.packageName;
        final float scale=getScale(pkg);

        if(scale<1.0f){
            new Thread(() -> apply(pkg,scale)).start();
        }
    }

    private float getScale(String pkg){
        try{
            BufferedReader br=new BufferedReader(new FileReader(FILE));
            String line;
            while((line=br.readLine())!=null){
                if(line.startsWith(pkg+"=")){
                    br.close();
                    return Float.parseFloat(line.split("=")[1].trim());
                }
            }
            br.close();
        }catch(Exception ignored){}
        return 1.0f;
    }

    private void apply(String pkg,float scale){
        try{
            String s=String.format(Locale.US,"%.2f",scale);
            String cmd="cmd game downscale "+s+" "+pkg+
                " || cmd game set --downscale "+s+" "+pkg;
            Process p=Runtime.getRuntime().exec("su");
            DataOutputStream os=new DataOutputStream(p.getOutputStream());
            os.writeBytes(cmd+"\\n");
            os.writeBytes("exit\\n");
            os.flush();
            os.close();
        }catch(Exception ignored){}
    }
}
""")
          print("FULL PATCH OK")
          PYEOF

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Grant gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ResChange-Reborn-Full
          path: app/build/outputs/apk/release/*.apk
