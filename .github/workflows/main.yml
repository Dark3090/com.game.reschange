name: Fix DisplayMetrics Hook

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Fix XposedInit.java - Remove CATEGORY_GAME Hook
        run: |
          cat > app/src/main/java/com/game/reschange/XposedInit.java << 'EOF'
          package com.game.reschange;

          import android.util.DisplayMetrics;
          import android.view.Display;
          import android.content.SharedPreferences;
          import android.app.Application;
          import android.content.Context;

          import de.robv.android.xposed.IXposedHookLoadPackage;
          import de.robv.android.xposed.XposedBridge;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.callbacks.XC_LoadPackage.LoadPackageParam;

          public class XposedInit implements IXposedHookLoadPackage {

              private static SharedPreferences sharedPrefs;

              @Override
              public void handleLoadPackage(LoadPackageParam lpparam) throws Throwable {
                  try {
                      hookDisplayMetrics(lpparam);
                  } catch (Exception e) {
                      XposedBridge.log("ResChange Error: " + e.getMessage());
                  }
              }

              private void hookDisplayMetrics(LoadPackageParam lpparam) throws Throwable {
                  Class<?> displayClass = XposedHelpers.findClass("android.view.Display", lpparam.classLoader);

                  // Hook getRealMetrics(DisplayMetrics)
                  XposedHelpers.findAndHookMethod(
                      displayClass,
                      "getRealMetrics",
                      DisplayMetrics.class,
                      new XC_MethodHook() {
                          @Override
                          protected void afterHookedMethod(MethodHookParam param) throws Throwable {
                              applyScale(lpparam.packageName, (DisplayMetrics) param.args[0]);
                          }
                      }
                  );

                  // Hook getMetrics(DisplayMetrics) 
                  XposedHelpers.findAndHookMethod(
                      displayClass,
                      "getMetrics",
                      DisplayMetrics.class,
                      new XC_MethodHook() {
                          @Override
                          protected void afterHookedMethod(MethodHookParam param) throws Throwable {
                              applyScale(lpparam.packageName, (DisplayMetrics) param.args[0]);
                          }
                      }
                  );

                  // Hook getRealSize(Point)
                  try {
                      Class<?> pointClass = XposedHelpers.findClass("android.graphics.Point", lpparam.classLoader);
                      XposedHelpers.findAndHookMethod(
                          displayClass,
                          "getRealSize",
                          pointClass,
                          new XC_MethodHook() {
                              @Override
                              protected void afterHookedMethod(MethodHookParam param) throws Throwable {
                                  Object point = param.args[0];
                                  float scale = getScale(lpparam.packageName);
                                  if (scale != 1.0f) {
                                      int x = (int) XposedHelpers.getIntField(point, "x");
                                      int y = (int) XposedHelpers.getIntField(point, "y");
                                      XposedHelpers.setIntField(point, "x", (int)(x * scale));
                                      XposedHelpers.setIntField(point, "y", (int)(y * scale));
                                  }
                              }
                          }
                      );
                  } catch (Exception e) {
                      // getRealSize may not exist in all Android versions
                  }

                  // Hook getSize(Point)
                  try {
                      Class<?> pointClass = XposedHelpers.findClass("android.graphics.Point", lpparam.classLoader);
                      XposedHelpers.findAndHookMethod(
                          displayClass,
                          "getSize",
                          pointClass,
                          new XC_MethodHook() {
                              @Override
                              protected void afterHookedMethod(MethodHookParam param) throws Throwable {
                                  Object point = param.args[0];
                                  float scale = getScale(lpparam.packageName);
                                  if (scale != 1.0f) {
                                      int x = (int) XposedHelpers.getIntField(point, "x");
                                      int y = (int) XposedHelpers.getIntField(point, "y");
                                      XposedHelpers.setIntField(point, "x", (int)(x * scale));
                                      XposedHelpers.setIntField(point, "y", (int)(y * scale));
                                  }
                              }
                          }
                      );
                  } catch (Exception e) {
                      // getSize may not exist in all Android versions
                  }
              }

              private void applyScale(String packageName, DisplayMetrics metrics) {
                  float scale = getScale(packageName);
                  if (scale != 1.0f && metrics != null) {
                      metrics.widthPixels = Math.round(metrics.widthPixels * scale);
                      metrics.heightPixels = Math.round(metrics.heightPixels * scale);
                      metrics.density *= scale;
                      metrics.densityDpi = Math.round(metrics.densityDpi * scale);
                      metrics.xdpi *= scale;
                      metrics.ydpi *= scale;
                  }
              }

              private float getScale(String packageName) {
                  try {
                      String scaleStr = readScaleFromFile(packageName);
                      if (scaleStr != null && !scaleStr.isEmpty()) {
                          return Float.parseFloat(scaleStr);
                      }
                  } catch (Exception e) {
                      XposedBridge.log("ResChange: Error reading scale: " + e.getMessage());
                  }
                  return 1.0f;
              }

              private String readScaleFromFile(String packageName) {
                  try {
                      java.io.File file = new java.io.File("/data/local/tmp/reschange_" + packageName + ".txt");
                      if (file.exists()) {
                          java.nio.file.Files.readAllLines(file.toPath());
                          java.util.Scanner scanner = new java.util.Scanner(file);
                          if (scanner.hasNextLine()) {
                              String result = scanner.nextLine();
                              scanner.close();
                              return result.trim();
                          }
                          scanner.close();
                      }
                  } catch (Exception e) {
                      XposedBridge.log("ResChange: Cannot read config file: " + e.getMessage());
                  }
                  return null;
              }
          }
          EOF

      - name: Update ScalePrefs.kt - Write to /data/local/tmp/
        run: |
          cat > app/src/main/java/com/game/reschange/ScalePrefs.kt << 'EOF'
          package com.game.reschange

          import android.content.Context
          import androidx.core.content.edit
          import java.io.File

          object ScalePrefs {
              private const val PREF_NAME = "scale_prefs"

              fun saveScale(context: Context, packageName: String, scale: Float) {
                  // Salva em SharedPreferences (local)
                  context.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE)
                      .edit {
                          putFloat(packageName, scale)
                      }

                  // Salva em arquivo acessível ao módulo Xposed
                  writeScaleFile(packageName, scale)
              }

              fun removeScale(context: Context, packageName: String) {
                  context.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE)
                      .edit {
                          remove(packageName)
                      }
                  
                  deleteScaleFile(packageName)
              }

              fun clearAll(context: Context) {
                  context.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE)
                      .edit { clear() }

                  // Delete all scale files
                  try {
                      val tmpDir = File("/data/local/tmp")
                      tmpDir.listFiles()?.forEach { file ->
                          if (file.name.startsWith("reschange_")) {
                              file.delete()
                          }
                      }
                  } catch (e: Exception) {
                      e.printStackTrace()
                  }
              }

              fun getScale(context: Context, packageName: String): Float {
                  return context.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE)
                      .getFloat(packageName, 1.0f)
              }

              fun getAllPackages(context: Context): Set<String> {
                  return context.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE).all.keys
              }

              private fun writeScaleFile(packageName: String, scale: Float) {
                  try {
                      val file = File("/data/local/tmp/reschange_$packageName.txt")
                      file.writeText(scale.toString())
                      Runtime.getRuntime().exec(arrayOf("chmod", "644", file.absolutePath)).waitFor()
                  } catch (e: Exception) {
                      e.printStackTrace()
                  }
              }

              private fun deleteScaleFile(packageName: String) {
                  try {
                      val file = File("/data/local/tmp/reschange_$packageName.txt")
                      file.delete()
                  } catch (e: Exception) {
                      e.printStackTrace()
                  }
              }
          }
          EOF

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ResChange-Fixed-${{ github.sha }}
          path: app/build/outputs/apk/release/
          retention-days: 30
