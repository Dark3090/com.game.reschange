name: Rewrite with XposedAppSettings (DisplayMetrics hooks)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  rewrite-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Overwrite XposedInit.java
        run: |
          mkdir -p app/src/main/java/com/game/reschange
          cat > app/src/main/java/com/game/reschange/XposedInit.java << 'EOF'
          package com.game.reschange;

          import android.util.DisplayMetrics;
          import android.graphics.Point;

          import de.robv.android.xposed.IXposedHookLoadPackage;
          import de.robv.android.xposed.XposedBridge;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.callbacks.XC_LoadPackage.LoadPackageParam;

          import java.io.File;
          import java.util.Scanner;

          public class XposedInit implements IXposedHookLoadPackage {

              @Override
              public void handleLoadPackage(final LoadPackageParam lpparam) throws Throwable {
                  // Log every package to check module is loaded
                  XposedBridge.log("ResChange: handleLoadPackage for " + lpparam.packageName);
                  try {
                      hookDisplayMethods(lpparam);
                  } catch (Throwable t) {
                      XposedBridge.log("ResChange: hookDisplayMethods failed: " + t.toString());
                  }
              }

              private void hookDisplayMethods(final LoadPackageParam lpparam) {
                  final String displayClass = "android.view.Display";

                  // getRealMetrics(DisplayMetrics)
                  try {
                      XposedHelpers.findAndHookMethod(
                              displayClass,
                              lpparam.classLoader,
                              "getRealMetrics",
                              DisplayMetrics.class,
                              new XC_MethodHook() {
                                  @Override
                                  protected void afterHookedMethod(MethodHookParam param) throws Throwable {
                                      Object arg = param.args.length > 0 ? param.args[0] : null;
                                      if (arg instanceof DisplayMetrics) {
                                          applyScale(lpparam.packageName, (DisplayMetrics) arg);
                                      }
                                  }
                              }
                      );
                  } catch (Throwable t) {
                      XposedBridge.log("ResChange: getRealMetrics hook failed: " + t.toString());
                  }

                  // getMetrics(DisplayMetrics)
                  try {
                      XposedHelpers.findAndHookMethod(
                              displayClass,
                              lpparam.classLoader,
                              "getMetrics",
                              DisplayMetrics.class,
                              new XC_MethodHook() {
                                  @Override
                                  protected void afterHookedMethod(MethodHookParam param) throws Throwable {
                                      Object arg = param.args.length > 0 ? param.args[0] : null;
                                      if (arg instanceof DisplayMetrics) {
                                          applyScale(lpparam.packageName, (DisplayMetrics) arg);
                                      }
                                  }
                              }
                      );
                  } catch (Throwable t) {
                      XposedBridge.log("ResChange: getMetrics hook failed: " + t.toString());
                  }

                  // getRealSize(Point)
                  try {
                      XposedHelpers.findAndHookMethod(
                              displayClass,
                              lpparam.classLoader,
                              "getRealSize",
                              Point.class,
                              new XC_MethodHook() {
                                  @Override
                                  protected void afterHookedMethod(MethodHookParam param) throws Throwable {
                                      Object point = param.args.length > 0 ? param.args[0] : null;
                                      if (point != null) {
                                          applyScaleToPoint(lpparam.packageName, point);
                                      }
                                  }
                              }
                      );
                  } catch (Throwable ignored) {}

                  // getSize(Point)
                  try {
                      XposedHelpers.findAndHookMethod(
                              displayClass,
                              lpparam.classLoader,
                              "getSize",
                              Point.class,
                              new XC_MethodHook() {
                                  @Override
                                  protected void afterHookedMethod(MethodHookParam param) throws Throwable {
                                      Object point = param.args.length > 0 ? param.args[0] : null;
                                      if (point != null) {
                                          applyScaleToPoint(lpparam.packageName, point);
                                      }
                                  }
                              }
                      );
                  } catch (Throwable ignored) {}
              }

              private void applyScale(String packageName, DisplayMetrics metrics) {
                  if (metrics == null) return;
                  float scale = readScaleForPackage(packageName);
                  if (scale == 1.0f) return;

                  // Debug log
                  XposedBridge.log("ResChange: applying scale " + scale + " for " + packageName);

                  metrics.widthPixels = Math.round(metrics.widthPixels * scale);
                  metrics.heightPixels = Math.round(metrics.heightPixels * scale);
                  metrics.density = metrics.density * scale;
                  metrics.densityDpi = Math.round(metrics.densityDpi * scale);
                  metrics.xdpi = metrics.xdpi * scale;
                  metrics.ydpi = metrics.ydpi * scale;
              }

              private void applyScaleToPoint(String packageName, Object point) {
                  try {
                      float scale = readScaleForPackage(packageName);
                      if (scale == 1.0f) return;
                      int x = XposedHelpers.getIntField(point, "x");
                      int y = XposedHelpers.getIntField(point, "y");
                      XposedHelpers.setIntField(point, "x", Math.round(x * scale));
                      XposedHelpers.setIntField(point, "y", Math.round(y * scale));
                  } catch (Throwable t) {
                      // ignore safely
                  }
              }

              private float readScaleForPackage(String packageName) {
                  try {
                      File f = new File("/data/local/tmp/reschange_" + packageName + ".txt");
                      if (!f.exists()) return 1.0f;
                      try (Scanner s = new Scanner(f)) {
                          if (!s.hasNext()) return 1.0f;
                          String token = s.next();
                          try {
                              float value = Float.parseFloat(token.trim());
                              if (value <= 0f || value > 2.0f) return 1.0f;
                              return value;
                          } catch (NumberFormatException e) {
                              return 1.0f;
                          }
                      }
                  } catch (Throwable t) {
                      XposedBridge.log("ResChange: error reading scale file: " + t.toString());
                      return 1.0f;
                  }
              }
          }
          EOF

      - name: Overwrite ScalePrefs.kt
        run: |
          cat > app/src/main/java/com/game/reschange/ScalePrefs.kt << 'EOF'
          package com.game.reschange

          import android.content.Context
          import androidx.core.content.edit
          import java.io.File

          object ScalePrefs {
              private const val PREF_NAME = "scale_prefs"

              fun saveScale(context: Context, packageName: String, scale: Float) {
                  // Save locally
                  context.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE)
                      .edit {
                          putFloat(packageName, scale)
                      }
                  // Write file for Xposed module
                  writeScaleFile(packageName, scale)
              }

              fun removeScale(context: Context, packageName: String) {
                  context.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE)
                      .edit { remove(packageName) }
                  deleteScaleFile(packageName)
              }

              fun clearAll(context: Context) {
                  context.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE)
                      .edit { clear() }
                  // delete tmp files
                  try {
                      val dir = File("/data/local/tmp")
                      dir.listFiles()?.forEach { f ->
                          if (f.name.startsWith("reschange_")) {
                              f.delete()
                          }
                      }
                  } catch (e: Exception) { /* ignore */ }
              }

              fun getScale(context: Context, packageName: String): Float {
                  return context.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE)
                      .getFloat(packageName, 1.0f)
              }

              fun getAllPackages(context: Context): Set<String> {
                  return context.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE).all.keys
              }

              private fun writeScaleFile(packageName: String, scale: Float) {
                  try {
                      val f = File("/data/local/tmp/reschange_${packageName}.txt")
                      f.writeText(scale.toString())
                      Runtime.getRuntime().exec(arrayOf("chmod", "644", f.absolutePath)).waitFor()
                  } catch (e: Exception) { e.printStackTrace() }
              }

              private fun deleteScaleFile(packageName: String) {
                  try {
                      val f = File("/data/local/tmp/reschange_${packageName}.txt")
                      f.delete()
                  } catch (e: Exception) { e.printStackTrace() }
              }
          }
          EOF

      - name: Verify CATEGORY_GAME was removed and hooks exist
        run: |
          if grep -R "CATEGORY_GAME" app/src/main/java | grep -q .; then
            echo "CATEGORY_GAME found in source, aborting"
            exit 1
          fi
          if ! grep -R "getRealMetrics" app/src/main/java | grep -q .; then
            echo "Hooks not found, aborting"
            exit 1
          fi
          echo "Sanity checks passed"

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant gradlew execute
        run: chmod +x gradlew || true

      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ResChange-DisplayMetrics-${{ github.sha }}
          path: app/build/outputs/apk/release/
          retention-days: 30
