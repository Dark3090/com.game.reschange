name: Build Patched APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # Permite rodar manualmente pelo GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────
      # FIX 1 + FIX 2 — Substitui XposedInit.java
      # corrigindo o bug de category e a persistência
      # ─────────────────────────────────────────────
      - name: Patch — XposedInit.java (Fix category bug + auto-reapply)
        run: |
          cat > app/src/main/java/com/game/reschange/XposedInit.java << 'EOF'
          package com.game.reschange;

          import android.content.pm.ApplicationInfo;
          import android.content.pm.PackageManager;

          import de.robv.android.xposed.IXposedHookLoadPackage;
          import de.robv.android.xposed.callbacks.XC_LoadPackage.LoadPackageParam;
          import de.robv.android.xposed.XposedBridge;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.XC_MethodHook;
          import android.content.Context;
          import android.content.SharedPreferences;

          import java.io.DataOutputStream;

          public class XposedInit implements IXposedHookLoadPackage {

              private static final String PREF_NAME = "scale_prefs";
              private static final String MODULE_PACKAGE = "com.game.reschange";

              @Override
              public void handleLoadPackage(final LoadPackageParam lpparam) throws Throwable {

                  XposedBridge.hookAllMethods(
                          XposedHelpers.findClass("android.app.Application", lpparam.classLoader),
                          "onCreate",
                          new XC_MethodHook() {
                              @Override
                              protected void beforeHookedMethod(MethodHookParam param) throws Throwable {
                                  final Context appContext = (Context) param.thisObject;
                                  final String currentPackage = lpparam.packageName;

                                  // Lê a escala salva para ESTE app especificamente
                                  final float savedScale = getSavedScale(appContext, currentPackage);

                                  // FIX 1: Só age em apps que o usuário configurou explicitamente
                                  if (savedScale < 1.0f) {

                                      // FIX 2: Reaplicar automaticamente ao abrir o app
                                      // Resolve o bug de "precisa clicar Apply toda vez"
                                      reApplyDownscale(currentPackage, savedScale);

                                      PackageManager mPkgMgr = appContext.getPackageManager();

                                      XposedBridge.hookAllMethods(
                                              mPkgMgr.getClass(),
                                              "getApplicationInfoAsUser",
                                              new XC_MethodHook() {
                                                  @Override
                                                  protected void afterHookedMethod(MethodHookParam param) throws Throwable {
                                                      ApplicationInfo info = (ApplicationInfo) param.getResultOrThrowable();

                                                      // FIX 1: Só marca como GAME este pacote, não todos os apps
                                                      if (info != null && currentPackage.equals(info.packageName)) {
                                                          info.category = ApplicationInfo.CATEGORY_GAME;
                                                          param.setResult(info);
                                                      }
                                                  }
                                              });
                                  }
                              }
                          }
                  );
              }

              private float getSavedScale(Context appContext, String packageName) {
                  try {
                      Context moduleContext = appContext.createPackageContext(
                              MODULE_PACKAGE,
                              Context.CONTEXT_IGNORE_SECURITY
                      );
                      SharedPreferences prefs = moduleContext.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE);
                      return prefs.getFloat(packageName, 1.0f);
                  } catch (Exception e) {
                      return 1.0f;
                  }
              }

              private void reApplyDownscale(String packageName, float scale) {
                  try {
                      String scaleStr = String.format(java.util.Locale.US, "%.2f", scale);
                      String command = "cmd game downscale " + scaleStr + " " + packageName +
                              " 2>/dev/null || cmd game set --downscale " + scaleStr + " " + packageName;

                      Process process = Runtime.getRuntime().exec("su");
                      DataOutputStream os = new DataOutputStream(process.getOutputStream());
                      os.writeBytes(command + "\n");
                      os.writeBytes("exit\n");
                      os.flush();
                      os.close();
                      process.waitFor();
                  } catch (Exception e) {
                      // Silently ignore if root is unavailable
                  }
              }
          }
          EOF

      # ─────────────────────────────────────────────
      # FIX 3 — Patcha MainActivity.kt para listar
      # TODOS os apps, não só os com ícone launcher
      # ─────────────────────────────────────────────
      - name: Patch — MainActivity.kt (Fix listagem de todos os apps)
        run: |
          python3 << 'PYEOF'
          import re

          path = "app/src/main/java/com/game/reschange/MainActivity.kt"
          with open(path, "r") as f:
              content = f.read()

          # Localiza e substitui o bloco getUserInstalledApps
          old = re.search(
              r'private fun getUserInstalledApps\(\).*?\.sortedBy \{ it\.name\.lowercase\(\) \}\s*\}',
              content, re.DOTALL
          )

          if not old:
              print("ERRO: Bloco getUserInstalledApps não encontrado!")
              exit(1)

          new_block = '''private fun getUserInstalledApps(): List<AppInfo> {
              val pm = packageManager

              // FIX 3: Lista TODOS os apps instalados, não só os com launcher
              val allPackages = pm.getInstalledApplications(PackageManager.GET_META_DATA)
                  .filter { app ->
                      (app.flags and ApplicationInfo.FLAG_SYSTEM) == 0 &&
                      app.packageName != packageName
                  }
                  .distinctBy { it.packageName }

              return allPackages.map { app ->
                  AppInfo(
                      name = pm.getApplicationLabel(app).toString(),
                      packageName = app.packageName,
                      icon = try {
                          pm.getApplicationIcon(app)
                      } catch (e: Exception) {
                          pm.defaultActivityIcon
                      }
                  )
              }.sortedBy { it.name.lowercase() }
          }'''

          content = content[:old.start()] + new_block + content[old.end():]
          with open(path, "w") as f:
              f.write(content)

          print("Patch aplicado com sucesso!")
          PYEOF

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Permissão para gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: reschange-patched-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
