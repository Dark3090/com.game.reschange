name: Build ResChange — DisplayMetrics

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clonar codigo fonte original
        run: |
          git clone https://github.com/Xposed-Modules-Repo/com.game.reschange source
          cp -r source/. .
          rm -rf source

      # ── PATCH 1 — XposedInit.java ──────────────────────────────
      # Nova abordagem: hook em Resources.getDisplayMetrics()
      # Nao depende de CATEGORY_GAME nem de cmd game downscale.
      # Funciona para qualquer app em Android 8.1 ate 16+.
      # Baseado na abordagem comprovada do XposedAppSettings (rovo89).
      - name: Patch 1 — XposedInit.java (DisplayMetrics hook)
        run: echo '' | base64 -d > app/src/main/java/com/game/reschange/XposedInit.java

      # ── PATCH 2 — ScalePrefs.kt ────────────────────────────────
      # Salva config em /data/local/tmp/reschange_config.txt (644)
      # para o XposedInit ler sem SELinux block (Android 12+).
      # Adiciona removeScale() e clearAll() para reset funcionar.
      - name: Patch 2 — ScalePrefs.kt
        run: echo '' | base64 -d > app/src/main/java/com/game/reschange/ScalePrefs.kt

      # ── PATCH 3 — MainActivity.kt ──────────────────────────────
      # Lista TODOS os apps instalados (nao so os com launcher).
      # Reset correto via ScalePrefs.clearAll() e removeScale().
      - name: Patch 3 — MainActivity.kt
        run: echo '' | base64 -d > app/src/main/java/com/game/reschange/MainActivity.kt

      # ── PATCH 4 — module_scope.xml ─────────────────────────────
      # Mantido para compatibilidade maxima com versoes do LSPosed.
      - name: Patch 4 — module_scope.xml
        run: echo 'PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHJlc291cmNlcz4KICAgIDxzdHJpbmctYXJyYXkgbmFtZT0ibW9kdWxlX3Njb3BlIj4KICAgICAgICA8aXRlbT5hbmRyb2lkPC9pdGVtPgogICAgPC9zdHJpbmctYXJyYXk+CjwvcmVzb3VyY2VzPg==' | base64 -d > app/src/main/res/values/module_scope.xml

      - name: Verificar patches
        run: |
          python3 - << 'EOF'
          import sys
          errors = []
          with open('app/src/main/java/com/game/reschange/XposedInit.java') as f: x = f.read()
          with open('app/src/main/java/com/game/reschange/ScalePrefs.kt')   as f: s = f.read()
          with open('app/src/main/java/com/game/reschange/MainActivity.kt') as f: m = f.read()
          x_code = '\n'.join(l for l in x.split('\n') if not l.strip().startswith('//'))
          checks = [
              ('getDisplayMetrics'        in x_code,  'XposedInit: hook DisplayMetrics'),
              ('widthPixels'              in x_code,  'XposedInit: widthPixels'),
              ('heightPixels'             in x_code,  'XposedInit: heightPixels'),
              ('CATEGORY_GAME'        not in x_code,  'XposedInit: sem CATEGORY_GAME no codigo'),
              ('ApplicationInfo'      not in x_code,  'XposedInit: sem ApplicationInfo'),
              ('writeConfigFile'          in s,       'ScalePrefs: writeConfigFile'),
              ('removeScale'              in s,       'ScalePrefs: removeScale'),
              ('clearAll'                 in s,       'ScalePrefs: clearAll'),
              ('getInstalledApplications' in m,       'MainActivity: getInstalledApplications'),
              ('ScalePrefs.clearAll'      in m,       'MainActivity: ScalePrefs.clearAll'),
              ('ScalePrefs.removeScale'   in m,       'MainActivity: ScalePrefs.removeScale'),
          ]
          for ok, label in checks:
              print(('OK  ' if ok else 'FAIL'), label)
              if not ok: errors.append(label)
          if errors:
              print('\nFalhas:', errors)
              sys.exit(1)
          print('\nTodos os patches verificados!')
          EOF

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Permissao gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ResChange-DisplayMetrics-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
