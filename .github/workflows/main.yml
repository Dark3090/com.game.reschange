name: Build ResChange Patched

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ── Clona o código fonte original ──────────────────────────
      # Feito ANTES dos patches para garantir que sempre partimos
      # do original, independente do que estiver no seu fork.
      - name: Clonar código original
        run: |
          git clone https://github.com/Xposed-Modules-Repo/com.game.reschange source
          cp -r source/. .
          rm -rf source

      # ── PATCH 1 — XposedInit.java ──────────────────────────────
      # Corrige:
      #   - Hook no system_server (processo "android") — é onde o
      #     Android decide se o app pode usar downscale
      #   - CATEGORY_GAME apenas nos apps configurados, não todos
      #   - Lê config via arquivo world-readable (sem SELinux block)
      #   - Reaplicar downscale direto no onCreate, sem Thread
      #     (Thread causava race condition — app iniciava sem escala)
      - name: Patch 1 — XposedInit.java
        run: |
          echo '' | base64 -d > app/src/main/java/com/game/reschange/XposedInit.java

      # ── PATCH 2 — ScalePrefs.kt ────────────────────────────────
      # Corrige:
      #   - Grava /data/local/tmp/reschange_config.txt com chmod 644
      #     (world-readable para o system_server ler sem SELinux)
      #   - removeScale() e clearAll() para o reset funcionar
      - name: Patch 2 — ScalePrefs.kt
        run: |
          echo '' | base64 -d > app/src/main/java/com/game/reschange/ScalePrefs.kt

      # ── PATCH 3 — MainActivity.kt ──────────────────────────────
      # Corrige:
      #   - Lista TODOS os apps instalados via getInstalledApplications
      #     (antes só listava apps com ícone de launcher)
      #   - Reset usa ScalePrefs.clearAll() e ScalePrefs.removeScale()
      - name: Patch 3 — MainActivity.kt
        run: |
          echo '' | base64 -d > app/src/main/java/com/game/reschange/MainActivity.kt

      # ── PATCH 4 — module_scope.xml ─────────────────────────────
      # Corrige:
      #   - Adiciona "android" no scope do LSPosed
      #     SEM isso o LSPosed não injeta no system_server e o hook
      #     de CATEGORY_GAME nunca executa — causa raiz do bug principal
      - name: Patch 4 — module_scope.xml
        run: |
          echo 'PD94bWwgdmVyc2lvbj0iMS4wIiBlbmNvZGluZz0idXRmLTgiPz4KPHJlc291cmNlcz4KICAgIDxzdHJpbmctYXJyYXkgbmFtZT0ibW9kdWxlX3Njb3BlIj4KICAgICAgICA8aXRlbT5hbmRyb2lkPC9pdGVtPgogICAgPC9zdHJpbmctYXJyYXk+CjwvcmVzb3VyY2VzPg==' | base64 -d > app/src/main/res/values/module_scope.xml

      # ── Verifica todos os patches ──────────────────────────────
      - name: Verificar patches
        run: |
          python3 - << 'EOF'
          import sys
          errors = []

          with open('app/src/main/java/com/game/reschange/XposedInit.java') as f: x = f.read()
          with open('app/src/main/java/com/game/reschange/ScalePrefs.kt')   as f: s = f.read()
          with open('app/src/main/java/com/game/reschange/MainActivity.kt') as f: m = f.read()
          with open('app/src/main/res/values/module_scope.xml')             as f: scope = f.read()

          checks = [
              ('"android".equals'          in x,     'XposedInit: hook system_server'),
              ('CONFIG_FILE'               in x,     'XposedInit: CONFIG_FILE'),
              ('readScaleFromFile'         in x,     'XposedInit: readScaleFromFile'),
              ('reApplyDownscale'          in x,     'XposedInit: reApplyDownscale'),
              ('new Thread'               not in x,  'XposedInit: sem Thread (race condition)'),
              ('writeConfigFile'           in s,     'ScalePrefs: writeConfigFile'),
              ('removeScale'               in s,     'ScalePrefs: removeScale'),
              ('clearAll'                  in s,     'ScalePrefs: clearAll'),
              ('getInstalledApplications'  in m,     'MainActivity: getInstalledApplications'),
              ('ScalePrefs.clearAll'       in m,     'MainActivity: ScalePrefs.clearAll'),
              ('ScalePrefs.removeScale'    in m,     'MainActivity: ScalePrefs.removeScale'),
              ('<item>android</item>'      in scope, 'module_scope.xml: inclui android'),
          ]

          for ok, label in checks:
              print(('OK  ' if ok else 'FAIL'), label)
              if not ok: errors.append(label)

          if errors:
              print('\nPatches com falha:', errors)
              sys.exit(1)
          print('\nTodos os patches verificados com sucesso!')
          EOF

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Permissão gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ResChange-Patched-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
