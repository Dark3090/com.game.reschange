name: Build GameResChange (Fixed)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Aplicar fix no XposedInit.java
        run: |
          cat > app/src/main/java/com/game/reschange/XposedInit.java << 'JAVA'
          package com.game.reschange;

          import android.content.pm.ApplicationInfo;
          import android.content.pm.PackageManager;
          import android.content.SharedPreferences;
          import android.content.Context;

          import de.robv.android.xposed.IXposedHookLoadPackage;
          import de.robv.android.xposed.callbacks.XC_LoadPackage.LoadPackageParam;
          import de.robv.android.xposed.XposedBridge;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.XC_MethodHook;

          public class XposedInit implements IXposedHookLoadPackage {
              private static final String PREF_NAME = "scale_prefs";

              @Override
              public void handleLoadPackage(final LoadPackageParam lpparam) throws Throwable {
                  // Ignora o próprio módulo e o sistema
                  if (lpparam.packageName.equals("com.game.reschange")) return;
                  if (lpparam.packageName.equals("android")) return;

                  XposedBridge.hookAllMethods(
                          XposedHelpers.findClass("android.app.Application", lpparam.classLoader),
                          "onCreate",
                          new XC_MethodHook() {
                              @Override
                              protected void beforeHookedMethod(MethodHookParam param) throws Throwable {
                                  Context ctx = (Context) param.thisObject;
                                  PackageManager mPkgMgr = ctx.getPackageManager();

                                  // Checa nas prefs se esse pacote foi configurado pelo usuário
                                  try {
                                      Context moduleCtx = ctx.createPackageContext(
                                              "com.game.reschange",
                                              Context.CONTEXT_IGNORE_SECURITY
                                      );
                                      SharedPreferences prefs = moduleCtx.getSharedPreferences(
                                              PREF_NAME, Context.MODE_PRIVATE
                                      );

                                      // Só hookeia getApplicationInfoAsUser se o pacote tem escala configurada
                                      if (!prefs.contains(lpparam.packageName)) return;
                                      float scale = prefs.getFloat(lpparam.packageName, 1.0f);
                                      if (scale >= 1.0f) return;

                                  } catch (PackageManager.NameNotFoundException e) {
                                      return;
                                  }

                                  XposedBridge.hookAllMethods(
                                          mPkgMgr.getClass(),
                                          "getApplicationInfoAsUser",
                                          new XC_MethodHook() {
                                              @Override
                                              protected void afterHookedMethod(MethodHookParam param) throws Throwable {
                                                  ApplicationInfo info = (ApplicationInfo) param.getResultOrThrowable();
                                                  if (info == null) return;
                                                  info.category = ApplicationInfo.CATEGORY_GAME;
                                                  param.setResult(info);
                                              }
                                          });
                              }
                          }
                  );
              }
          }
          JAVA

      - name: Configurar Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: gradle-

      - name: Dar permissão ao gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: GameResChange-fixed
          path: app/build/outputs/apk/release/*.apk
          retention-days: 7
