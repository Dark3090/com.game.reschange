name: Build ResChange — Dual Mode

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Sempre parte do codigo original
      - name: Clonar codigo fonte original
        run: |
          git clone https://github.com/Xposed-Modules-Repo/com.game.reschange source
          cp -r source/. .
          rm -rf source

      # ── PATCH 1 — XposedInit.java ─────────────────────────────────────────
      # - Hook no system_server: CATEGORY_GAME apenas nos apps configurados
      # - Reaplicar automaticamente ao abrir o app (sem precisar clicar Apply)
      # - Le o modo do arquivo reschange_mode.txt e usa o comando correto:
      #   Default -> cmd game downscale
      #   Alternative -> device_config put game_overlay
      - name: Patch 1 — XposedInit.java
        run: |
          echo '' | base64 -d > app/src/main/java/com/game/reschange/XposedInit.java

      # ── PATCH 2 — MainActivity.kt ─────────────────────────────────────────
      # - Lista TODOS os apps instalados (nao so launcher)
      # - Botao de settings abre SettingsActivity
      # - buildApplyCommand/buildDisableCommand usa o modo ativo
      # - Reset correto via ResChangePrefs
      - name: Patch 2 — MainActivity.kt
        run: |
          echo '' | base64 -d > app/src/main/java/com/game/reschange/MainActivity.kt

      # ── PATCH 3 — SettingsActivity.kt (NOVO) ──────────────────────────────
      # - Tela de escolha: Default Mode vs Alternative Mode
      # - Alternative Mode desabilita sync GMS (device_config set_sync_disabled)
      #   Isso resolve o bug "depois de um tempo tem que reativar tudo"
      #   O GMS sobrescrevia o device_config periodicamente — agora nao mais
      - name: Patch 3 — SettingsActivity.kt (novo arquivo)
        run: |
          echo '' | base64 -d > app/src/main/java/com/game/reschange/SettingsActivity.kt

      # ── PATCH 4 — ModePrefs.kt (NOVO) ────────────────────────────────────
      # - Salva e le o modo escolhido (default/alternative)
      - name: Patch 4 — ModePrefs.kt (novo arquivo)
        run: |
          echo '' | base64 -d > app/src/main/java/com/game/reschange/ModePrefs.kt

      # ── PATCH 5 — ResChangePrefs.kt (substitui ScalePrefs.kt) ────────────
      # - Grava /data/local/tmp/reschange_config.txt com chmod 644
      # - world-readable para o XposedInit ler sem SELinux block
      # - Adiciona removeScale() e clearAll()
      - name: Patch 5 — ResChangePrefs.kt (substitui ScalePrefs.kt)
        run: |
          echo '' | base64 -d > app/src/main/java/com/game/reschange/ResChangePrefs.kt
          rm -f app/src/main/java/com/game/reschange/ScalePrefs.kt

      # ── PATCH 6 — activity_settings.xml (NOVO layout) ────────────────────
      - name: Patch 6 — activity_settings.xml (novo arquivo)
        run: |
          echo '' | base64 -d > app/src/main/res/layout/activity_settings.xml

      # ── PATCH 7 — AndroidManifest.xml ────────────────────────────────────
      # - Registra SettingsActivity
      - name: Patch 7 — AndroidManifest.xml
        run: |
          echo '' | base64 -d > app/src/main/AndroidManifest.xml

      # ── PATCH 8 — menu_main.xml ───────────────────────────────────────────
      # - Adiciona item "Operation Mode" (ic_gear) na toolbar
      - name: Patch 8 — menu_main.xml
        run: |
          echo '' | base64 -d > app/src/main/res/menu/menu_main.xml

      # ── Verificacao ───────────────────────────────────────────────────────
      - name: Verificar patches
        run: |
          python3 - << 'EOF'
          import sys, os
          errors = []

          base = 'app/src/main/java/com/game/reschange'
          res  = 'app/src/main/res'

          x = open(f'{base}/XposedInit.java').read()
          m = open(f'{base}/MainActivity.kt').read()
          s = open(f'{base}/SettingsActivity.kt').read()
          p = open(f'{base}/ModePrefs.kt').read()
          r = open(f'{base}/ResChangePrefs.kt').read()
          a = open('app/src/main/AndroidManifest.xml').read()
          x_code = '\n'.join(l for l in x.split('\n') if not l.strip().startswith('//'))

          checks = [
              ('"android".equals'                   in x_code, 'XposedInit: hook system_server'),
              ('CATEGORY_GAME'                      in x_code, 'XposedInit: CATEGORY_GAME'),
              ('readMode'                           in x_code, 'XposedInit: readMode'),
              ('"alternative".equals'               in x_code, 'XposedInit: modo alternative'),
              ('device_config put game_overlay'     in x_code, 'XposedInit: cmd alternative'),
              ('cmd game downscale'                 in x_code, 'XposedInit: cmd default'),
              ('getInstalledApplications'           in m,      'MainActivity: todos os apps'),
              ('ResChangePrefs'                     in m,      'MainActivity: usa ResChangePrefs'),
              ('buildApplyCommand'                  in m,      'MainActivity: buildApplyCommand'),
              ('SettingsActivity'                   in m,      'MainActivity: abre Settings'),
              ('set_sync_disabled_for_tests'        in s,      'SettingsActivity: desabilita GMS'),
              ('reschange_mode.txt'                 in s,      'SettingsActivity: modo file'),
              ('MODE_DEFAULT'                       in p,      'ModePrefs: MODE_DEFAULT'),
              ('MODE_ALTERNATIVE'                   in p,      'ModePrefs: MODE_ALTERNATIVE'),
              ('writeConfigFile'                    in r,      'ResChangePrefs: writeConfigFile'),
              ('removeScale'                        in r,      'ResChangePrefs: removeScale'),
              ('SettingsActivity'                   in a,      'AndroidManifest: SettingsActivity'),
              (not os.path.exists(f'{base}/ScalePrefs.kt'), 'ScalePrefs.kt removido'),
              (os.path.exists(f'{res}/layout/activity_settings.xml'), 'activity_settings.xml criado'),
          ]

          for ok, label in checks:
              print(('OK  ' if ok else 'FAIL'), label)
              if not ok: errors.append(label)

          if errors:
              print('\nFalhas:', errors)
              sys.exit(1)
          print(f'\n{len(checks)}/{len(checks)} — Todos os patches verificados!')
          EOF

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Permissao gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ResChange-DualMode-${{ github.sha }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30
