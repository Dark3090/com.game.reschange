name: Build ResChange — Force Game Category

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone upstream source
        run: |
          git clone https://github.com/Xposed-Modules-Repo/com.game.reschange source
          cp -r source/. .
          rm -rf source

      - name: Patch source for Force Game Category
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          from textwrap import dedent

          ROOT = Path('.')

          def write(path: str, content: str) -> None:
              p = ROOT / path
              p.parent.mkdir(parents=True, exist_ok=True)
              p.write_text(dedent(content).lstrip(), encoding='utf-8')

          write('app/src/main/java/com/game/reschange/ScalePrefs.kt', r'''
          package com.game.reschange

          import android.content.Context
          import androidx.core.content.edit
          import java.io.DataOutputStream
          import java.io.File
          import java.util.Locale

          object ScalePrefs {
              private const val PREF_NAME = "scale_prefs"
              private const val SCALE_FILE = "/data/local/tmp/reschange_config.txt"

              fun saveScale(context: Context, packageName: String, scale: Float) {
                  context.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE)
                      .edit { putFloat(packageName, scale) }
                  syncFile(context)
              }

              fun removeScale(context: Context, packageName: String) {
                  context.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE)
                      .edit { remove(packageName) }
                  syncFile(context)
              }

              fun clearAll(context: Context) {
                  context.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE)
                      .edit { clear() }
                  syncFile(context)
              }

              fun getAllPackages(context: Context): Set<String> {
                  return context.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE).all.keys
              }

              fun getScale(context: Context, packageName: String): Float {
                  return context.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE)
                      .getFloat(packageName, 1.0f)
              }

              private fun syncFile(context: Context) {
                  try {
                      val prefs = context.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE)
                      val lines = prefs.all.entries
                          .mapNotNull { (pkg, value) ->
                              val scale = (value as? Float) ?: return@mapNotNull null
                              if (scale < 1.0f) {
                                  "${pkg}=${String.format(Locale.US, "%.2f", scale)}"
                              } else {
                                  null
                              }
                          }
                          .sorted()
                          .joinToString("\n")

                      val script = buildString {
                          append("cat <<'EOF' > '")
                          append(SCALE_FILE)
                          append("'\n")
                          append(lines)
                          append("\nEOF\n")
                          append("chmod 644 '")
                          append(SCALE_FILE)
                          append("'\n")
                      }

                      Runtime.getRuntime().exec(arrayOf("su", "-c", script)).waitFor()
                  } catch (_: Exception) {
                  }
              }
          }
          ''')

          write('app/src/main/java/com/game/reschange/ForceGamePrefs.kt', r'''
          package com.game.reschange

          import android.content.Context
          import androidx.core.content.edit

          object ForceGamePrefs {
              private const val PREF_NAME = "force_game_prefs"
              private const val FORCE_FILE = "/data/local/tmp/reschange_force_games.txt"

              fun saveForce(context: Context, packageName: String, enabled: Boolean) {
                  context.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE)
                      .edit { putBoolean(packageName, enabled) }
                  syncFile(context)
              }

              fun isForced(context: Context, packageName: String): Boolean {
                  return context.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE)
                      .getBoolean(packageName, false)
              }

              fun getAllPackages(context: Context): Set<String> {
                  return context.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE).all.keys
              }

              fun removeForce(context: Context, packageName: String) {
                  context.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE)
                      .edit { remove(packageName) }
                  syncFile(context)
              }

              fun clearAll(context: Context) {
                  context.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE)
                      .edit { clear() }
                  syncFile(context)
              }

              private fun syncFile(context: Context) {
                  try {
                      val prefs = context.getSharedPreferences(PREF_NAME, Context.MODE_PRIVATE)
                      val lines = prefs.all.entries
                          .filter { (_, value) -> value == true }
                          .map { (pkg, _) -> pkg }
                          .sorted()
                          .joinToString("\n")

                      val script = buildString {
                          append("cat <<'EOF' > '")
                          append(FORCE_FILE)
                          append("'\n")
                          append(lines)
                          append("\nEOF\n")
                          append("chmod 644 '")
                          append(FORCE_FILE)
                          append("'\n")
                      }

                      Runtime.getRuntime().exec(arrayOf("su", "-c", script)).waitFor()
                  } catch (_: Exception) {
                  }
              }
          }
          ''')

          write('app/src/main/java/com/game/reschange/XposedInit.java', r'''
          package com.game.reschange;

          import android.content.Context;
          import android.content.pm.ApplicationInfo;
          import android.content.pm.PackageManager;

          import java.io.BufferedReader;
          import java.io.File;
          import java.io.FileReader;

          import de.robv.android.xposed.IXposedHookLoadPackage;
          import de.robv.android.xposed.XC_MethodHook;
          import de.robv.android.xposed.XposedBridge;
          import de.robv.android.xposed.XposedHelpers;
          import de.robv.android.xposed.callbacks.XC_LoadPackage.LoadPackageParam;

          public class XposedInit implements IXposedHookLoadPackage {

              private static final String SCALE_FILE = "/data/local/tmp/reschange_config.txt";
              private static final String FORCE_FILE = "/data/local/tmp/reschange_force_games.txt";

              @Override
              public void handleLoadPackage(final LoadPackageParam lpparam) throws Throwable {
                  XposedBridge.hookAllMethods(
                          XposedHelpers.findClass("android.app.Application", lpparam.classLoader),
                          "onCreate",
                          new XC_MethodHook() {
                              @Override
                              protected void beforeHookedMethod(MethodHookParam param) throws Throwable {
                                  if (!(param.thisObject instanceof Context)) return;

                                  PackageManager pm = ((Context) param.thisObject).getPackageManager();
                                  Class<?> pmClass = pm.getClass();

                                  XC_MethodHook hook = new XC_MethodHook() {
                                      @Override
                                      protected void afterHookedMethod(MethodHookParam param) throws Throwable {
                                          Object result = param.getResult();
                                          if (!(result instanceof ApplicationInfo)) return;

                                          ApplicationInfo info = (ApplicationInfo) result;
                                          if (info.packageName == null) return;

                                          if (isGameTarget(info.packageName)) {
                                              info.category = ApplicationInfo.CATEGORY_GAME;
                                              param.setResult(info);
                                          }
                                      }
                                  };

                                  XposedBridge.hookAllMethods(pmClass, "getApplicationInfo", hook);
                                  XposedBridge.hookAllMethods(pmClass, "getApplicationInfoAsUser", hook);
                              }
                          }
                  );
              }

              private boolean isGameTarget(String pkg) {
                  return readScale(pkg) < 1.0f || isForceGameCategory(pkg);
              }

              private boolean isForceGameCategory(String pkg) {
                  File file = new File(FORCE_FILE);
                  if (!file.exists()) return false;

                  try (BufferedReader br = new BufferedReader(new FileReader(file))) {
                      String line;
                      while ((line = br.readLine()) != null) {
                          if (pkg.equals(line.trim())) return true;
                      }
                  } catch (Exception ignored) {
                  }
                  return false;
              }

              private float readScale(String pkg) {
                  File file = new File(SCALE_FILE);
                  if (!file.exists()) return 1.0f;

                  try (BufferedReader br = new BufferedReader(new FileReader(file))) {
                      String line;
                      while ((line = br.readLine()) != null) {
                          line = line.trim();
                          if (line.startsWith(pkg + "=")) {
                              String value = line.split("=", 2)[1].trim();
                              return Float.parseFloat(value);
                          }
                      }
                  } catch (Exception ignored) {
                  }
                  return 1.0f;
              }
          }
          ''')

          write('app/src/main/java/com/game/reschange/AppListAdapter.kt', r'''
          package com.game.reschange

          import android.view.LayoutInflater
          import android.view.View
          import android.view.ViewGroup
          import android.widget.ImageView
          import android.widget.TextView
          import androidx.recyclerview.widget.RecyclerView

          class AppListAdapter(
              private var apps: List<AppInfo>,
              private val onClick: (AppInfo) -> Unit
          ) : RecyclerView.Adapter<AppListAdapter.AppViewHolder>() {

              inner class AppViewHolder(view: View) : RecyclerView.ViewHolder(view) {
                  val icon: ImageView = view.findViewById(R.id.appIcon)
                  val name: TextView = view.findViewById(R.id.appName)
                  val packageName: TextView = view.findViewById(R.id.packageName)
                  val modifiedIcon: ImageView = view.findViewById(R.id.modifiedIcon)
              }

              override fun onCreateViewHolder(parent: ViewGroup, viewType: Int): AppViewHolder {
                  val view = LayoutInflater.from(parent.context)
                      .inflate(R.layout.item_app, parent, false)
                  return AppViewHolder(view)
              }

              fun submitList(newList: List<AppInfo>) {
                  apps = newList
                  notifyDataSetChanged()
              }

              override fun onBindViewHolder(holder: AppViewHolder, position: Int) {
                  val app = apps[position]
                  holder.icon.setImageDrawable(app.icon)
                  holder.name.text = app.name
                  holder.packageName.text = app.packageName

                  val context = holder.itemView.context
                  val modified = ScalePrefs.getScale(context, app.packageName) < 1.0f ||
                      ForceGamePrefs.isForced(context, app.packageName)
                  holder.modifiedIcon.visibility = if (modified) View.VISIBLE else View.GONE

                  holder.itemView.setOnClickListener { onClick(app) }
              }

              override fun getItemCount(): Int = apps.size
          }
          ''')

          write('app/src/main/java/com/game/reschange/MainActivity.kt', r'''
          package com.game.reschange

          import android.content.pm.ApplicationInfo
          import android.content.pm.PackageManager
          import android.os.Bundle
          import android.view.View
          import android.widget.Button
          import android.widget.LinearLayout
          import android.widget.TextView
          import android.widget.Toast
          import androidx.appcompat.app.AppCompatActivity
          import androidx.core.view.WindowCompat
          import androidx.recyclerview.widget.LinearLayoutManager
          import androidx.recyclerview.widget.RecyclerView
          import com.google.android.material.dialog.MaterialAlertDialogBuilder
          import com.google.android.material.slider.Slider
          import com.google.android.material.switchmaterial.SwitchMaterial
          import com.google.android.material.tabs.TabLayout
          import java.io.DataOutputStream
          import java.util.Locale

          class MainActivity : AppCompatActivity() {

              private lateinit var recyclerView: RecyclerView
              private lateinit var adapter: AppListAdapter
              private lateinit var toggleModified: SwitchMaterial
              private lateinit var tabs: TabLayout
              private lateinit var allApps: List<AppInfo>

              private var showOnlyModified = false
              private var currentQuery = ""
              private var currentTab = TAB_COMPATIBLE

              companion object {
                  private const val TAB_COMPATIBLE = 0
                  private const val TAB_INCOMPATIBLE = 1
              }

              override fun onCreate(savedInstanceState: Bundle?) {
                  super.onCreate(savedInstanceState)
                  WindowCompat.setDecorFitsSystemWindows(window, false)
                  setContentView(R.layout.activity_main)
                  setSupportActionBar(findViewById(R.id.myToolbar))

                  recyclerView = findViewById(R.id.appList)
                  toggleModified = findViewById(R.id.toggleModified)
                  tabs = findViewById(R.id.categoryTabs)
                  recyclerView.layoutManager = LinearLayoutManager(this)

                  tabs.addTab(tabs.newTab().setText("Compatíveis"), true)
                  tabs.addTab(tabs.newTab().setText("Não compatíveis"))
                  tabs.addOnTabSelectedListener(object : TabLayout.OnTabSelectedListener {
                      override fun onTabSelected(tab: TabLayout.Tab?) {
                          currentTab = tab?.position ?: TAB_COMPATIBLE
                          filterAppList()
                      }

                      override fun onTabUnselected(tab: TabLayout.Tab?) = Unit
                      override fun onTabReselected(tab: TabLayout.Tab?) {
                          filterAppList()
                      }
                  })

                  allApps = getUserInstalledApps()
                  adapter = AppListAdapter(emptyList()) { appInfo ->
                      showResolutionDialog(appInfo.packageName)
                  }
                  recyclerView.adapter = adapter

                  toggleModified.setOnCheckedChangeListener { _, checked ->
                      showOnlyModified = checked
                      filterAppList()
                  }

                  findViewById<Button>(R.id.resetButton).setOnClickListener {
                      val scalePackages = ScalePrefs.getAllPackages(this)
                      for (pkg in scalePackages) {
                          runAsRoot(buildDisableCommand(pkg))
                      }

                      val forcedPackages = ForceGamePrefs.getAllPackages(this)
                      for (pkg in forcedPackages) {
                          ForceGamePrefs.removeForce(this, pkg)
                      }

                      ScalePrefs.clearAll(this)
                      ForceGamePrefs.clearAll(this)
                      filterAppList()
                      Toast.makeText(this, "Tudo foi redefinido", Toast.LENGTH_SHORT).show()
                  }

                  findViewById<TextView>(R.id.compatHint).text =
                      "Compatíveis = apps com resolução alterada ou Force Game Category."

                  filterAppList()
              }

              private fun filterAppList() {
                  var list = when (currentTab) {
                      TAB_COMPATIBLE -> allApps.filter { isGameTarget(it.packageName) }
                      TAB_INCOMPATIBLE -> allApps.filter { !isGameTarget(it.packageName) }
                      else -> allApps
                  }

                  if (showOnlyModified) {
                      list = list.filter { isModified(it.packageName) }
                  }

                  if (currentQuery.isNotEmpty()) {
                      val q = currentQuery.lowercase(Locale.getDefault())
                      list = list.filter {
                          it.name.lowercase(Locale.getDefault()).contains(q) ||
                              it.packageName.lowercase(Locale.getDefault()).contains(q)
                      }
                  }

                  adapter.submitList(list)
              }

              private fun isModified(packageName: String): Boolean {
                  return ScalePrefs.getScale(this, packageName) < 1.0f ||
                      ForceGamePrefs.isForced(this, packageName)
              }

              private fun isGameTarget(packageName: String): Boolean {
                  return ScalePrefs.getScale(this, packageName) < 1.0f ||
                      ForceGamePrefs.isForced(this, packageName)
              }

              private fun getUserInstalledApps(): List<AppInfo> {
                  val pm = packageManager
                  return pm.getInstalledApplications(PackageManager.GET_META_DATA)
                      .filter { app ->
                          (app.flags and ApplicationInfo.FLAG_SYSTEM) == 0 &&
                              app.packageName != packageName
                      }
                      .distinctBy { it.packageName }
                      .map { app ->
                          AppInfo(
                              name = pm.getApplicationLabel(app).toString(),
                              packageName = app.packageName,
                              icon = try {
                                  pm.getApplicationIcon(app)
                              } catch (_: Exception) {
                                  pm.defaultActivityIcon
                              }
                          )
                      }
                      .sortedBy { it.name.lowercase(Locale.getDefault()) }
              }

              private fun showResolutionDialog(packageName: String) {
                  val savedScale = ScalePrefs.getScale(this, packageName)
                  var forced = ForceGamePrefs.isForced(this, packageName)

                  val layout = LinearLayout(this).apply {
                      orientation = LinearLayout.VERTICAL
                      setPadding(50, 40, 50, 10)
                  }

                  val scaleText = TextView(this).apply {
                      textSize = 18f
                      setPadding(0, 0, 0, 20)
                      text = "Scale: ${(savedScale * 100).toInt()}%"
                  }

                  val slider = Slider(this).apply {
                      valueFrom = 0.30f
                      valueTo = 1.00f
                      stepSize = 0.05f
                      value = savedScale
                      isTickVisible = true
                  }

                  slider.addOnChangeListener { _, value, _ ->
                      scaleText.text = "Scale: ${(value * 100).toInt()}%"
                  }

                  val forceButton = Button(this).apply {
                      text = if (forced) "Disable Force Game Category" else "Force Game Category"
                  }

                  forceButton.setOnClickListener {
                      forced = !forced
                      ForceGamePrefs.saveForce(this, packageName, forced)
                      forceButton.text = if (forced) "Disable Force Game Category" else "Force Game Category"
                      runAsRoot("am force-stop $packageName")
                      filterAppList()
                      Toast.makeText(
                          this,
                          if (forced) "App marcado como jogo" else "Force Game Category removido",
                          Toast.LENGTH_SHORT
                      ).show()
                  }

                  layout.addView(scaleText)
                  layout.addView(slider)
                  layout.addView(forceButton)

                  MaterialAlertDialogBuilder(this)
                      .setTitle("Set Resolution Scale")
                      .setView(layout)
                      .setPositiveButton("Apply") { _, _ ->
                          var scale = String.format(Locale.US, "%.2f", slider.value).toFloat()

                          if (scale == 0.95f) {
                              scale = 0.90f
                              Toast.makeText(this, "95% não é suportado. Usando 90%.", Toast.LENGTH_SHORT).show()
                          }

                          if (scale >= 1.0f) {
                              runAsRoot(buildDisableCommand(packageName))
                              ScalePrefs.removeScale(this, packageName)
                              Toast.makeText(this, "Resolução resetada para 100%", Toast.LENGTH_SHORT).show()
                          } else {
                              runAsRoot(buildApplyCommand(packageName, scale))
                              ScalePrefs.saveScale(this, packageName, scale)
                              Toast.makeText(
                                  this,
                                  "${(scale * 100).toInt()}% aplicado",
                                  Toast.LENGTH_SHORT
                              ).show()
                          }

                          runAsRoot("am force-stop $packageName")
                          filterAppList()
                          Toast.makeText(this, "Reabra o app para aplicar", Toast.LENGTH_LONG).show()
                      }
                      .setNeutralButton("Reset Scale") { _, _ ->
                          runAsRoot(buildDisableCommand(packageName))
                          ScalePrefs.removeScale(this, packageName)
                          runAsRoot("am force-stop $packageName")
                          filterAppList()
                          Toast.makeText(this, "Scale removido", Toast.LENGTH_SHORT).show()
                      }
                      .setNegativeButton("Cancel", null)
                      .show()
              }

              private fun buildApplyCommand(pkg: String, scale: Float): String {
                  val scaleStr = String.format(Locale.US, "%.2f", scale)
                  return "cmd game downscale $scaleStr $pkg 2>/dev/null; cmd game set --downscale $scaleStr $pkg 2>/dev/null"
              }

              private fun buildDisableCommand(pkg: String): String {
                  return "cmd game downscale disable $pkg 2>/dev/null; cmd game set --downscale disable $pkg 2>/dev/null"
              }

              private fun runAsRoot(command: String) {
                  try {
                      val process = Runtime.getRuntime().exec("su")
                      DataOutputStream(process.outputStream).use { os ->
                          os.writeBytes("$command\n")
                          os.writeBytes("exit\n")
                          os.flush()
                      }
                      process.waitFor()
                  } catch (_: Exception) {
                  }
              }
          }
          ''')

          write('app/src/main/res/layout/activity_main.xml', r'''
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:app="http://schemas.android.com/apk/res-auto"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:fitsSystemWindows="true"
              android:paddingTop="8dp">

              <androidx.appcompat.widget.Toolbar
                  android:id="@+id/myToolbar"
                  android:layout_width="match_parent"
                  android:layout_height="?attr/actionBarSize"
                  android:background="?attr/colorSurface"
                  app:title="GameResChange"
                  app:titleTextColor="?android:attr/textColorPrimary" />

              <TextView
                  android:id="@+id/compatHint"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:paddingStart="16dp"
                  android:paddingTop="8dp"
                  android:paddingEnd="16dp"
                  android:textColor="?android:attr/textColorSecondary"
                  android:textSize="12sp"
                  android:text="Compatibilidade e Force Game Category aparecem aqui." />

              <com.google.android.material.tabs.TabLayout
                  android:id="@+id/categoryTabs"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:paddingStart="8dp"
                  android:paddingEnd="8dp"
                  app:tabGravity="fill"
                  app:tabMode="fixed" />

              <com.google.android.material.switchmaterial.SwitchMaterial
                  android:id="@+id/toggleModified"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:paddingStart="16dp"
